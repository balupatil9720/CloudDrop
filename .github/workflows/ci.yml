name: CloudDrop CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push Backend Image
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/clouddrop-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/clouddrop-backend

      # 4. Build & Push Frontend Image
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/clouddrop-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/clouddrop-frontend

      # 5. Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd CloudDrop
            docker compose down
            docker pull ${{ secrets.DOCKER_USERNAME }}/clouddrop-backend
            docker pull ${{ secrets.DOCKER_USERNAME }}/clouddrop-frontend
            docker compose up -d