name: CloudDrop CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout
  - name: Checkout
    uses: actions/checkout@v4

  # 2. Login Docker Hub
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # 3. Build & Push Backend
  - name: Build & Push Backend
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/clouddrop-backend:${{ github.sha }} ./backend
      docker push ${{ secrets.DOCKER_USERNAME }}/clouddrop-backend:${{ github.sha }}

  # 4. Build & Push Frontend
  - name: Build & Push Frontend
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/clouddrop-frontend:${{ github.sha }} ./frontend
      docker push ${{ secrets.DOCKER_USERNAME }}/clouddrop-frontend:${{ github.sha }}

  # 5. Deploy
  - name: Deploy to EC2
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd CloudDrop

        export TAG=${{ github.sha }}

        docker compose down
        docker compose pull
        docker compose up -d

        docker image prune -af
```
